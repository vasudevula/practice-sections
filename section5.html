<!DOCTYPE html>
<html>
<body>

<script>

// 1 Print numbers 1 to 5
let i = 1;
while (i <= 5) {
  console.log(i);
  i++;
}


// 2 Print numbers 5 to 1
let j = 5;
while (j >= 1) {
  console.log(j);
  j--;
}


// 3 Print even numbers 1 to 10
let k = 1;
while (k <= 10) {
  if (k % 2 === 0) {
    console.log(k);
  }
  k++;
}


// 4 Sum of numbers 1 to 10
let num = 1;
let sum = 0;

while (num <= 10) {
  sum = sum + num;
  num++;
}

console.log("Sum:", sum);


// 5 Square of numbers 1 to 5
let n = 1;
while (n <= 5) {
  console.log(n * n);
  n++;
}

</script>

</body>
</html>

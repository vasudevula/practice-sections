<!DOCTYPE html>
<html>
<body>

<script>

let marks = 85;

if (marks >= 90) {
  console.log("Grade A");
} else if (marks >= 70) {
  console.log("Grade B");
} else if (marks >= 50) {
  console.log("Grade C");
} else {
  console.log("Fail");
}

let hour = 14;

if (hour < 12) {
  console.log("Morning");
} else if (hour < 17) {
  console.log("Afternoon");
} else if (hour < 20) {
  console.log("Evening");
} else {
  console.log("Night");
}

let num = 0;

if (num > 0) {
  console.log("Positive");
} else if (num < 0) {
  console.log("Negative");
} else {
  console.log("Zero");
}

let score = 75;

if (score >= 100) {
  console.log("Winner");
} else if (score >= 50) {
  console.log("Good");
} else {
  console.log("Try again");
}

let a = 10;
let b = 25;
let c = 15;

if (a > b && a > c) {
  console.log("A is largest");
} else if (b > a && b > c) {
  console.log("B is largest");
} else {
  console.log("C is largest");
}

</script>

</body>
</html>

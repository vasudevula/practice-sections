<!DOCTYPE html>
<html>
<body>

<script>

let day = 1;

switch(day) {
  case 1:
    console.log("Monday");
    break;
  case 2:
    console.log("Tuesday");
    break;
  case 3:
    console.log("Wednesday");
    break;
  default:
    console.log("Invalid day");
}

let trafficLight = "Red";

switch(trafficLight) {
  case "Red":
    console.log("Stop");
    break;
  case "Yellow":
    console.log("Ready");
    break;
  case "Green":
    console.log("Go");
    break;
}
let month = 12;

switch(month) {
  case 12:
  case 1:
  case 2:
    console.log("Winter");
    break;

  case 3:
  case 4:
  case 5:
    console.log("Summer");
    break;

  case 6:
  case 7:
  case 8:
    console.log("Monsoon");
    break;

  case 9:
  case 10:
  case 11:
    console.log("Autumn");
    break;

  default:
    console.log("Invalid month");
}
let role = "Admin";

switch(role) {
  case "Admin":
    console.log("Full access");
    break;
  case "User":
    console.log("Limited access");
    break;
  case "Guest":
    console.log("Guest access");
    break;
}

let grade = "A";

switch(grade) {
  case "A":
    console.log("Excellent");
    break;
  case "B":
    console.log("Good");
    break;
  case "C":
    console.log("Average");
    break;
  default:
    console.log("Fail");
}

</script>

</body>
</html>

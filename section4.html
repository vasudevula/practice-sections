<!DOCTYPE html>
<html>
<body>

<script>

for (let i = 1; i <= 10; i++) {
  console.log(i);
}

for (let i = 10; i >= 1; i--) {
  console.log(i);
}

for (let i = 1; i <= 20; i++) {
  if (i % 2 === 0) {
    console.log(i);
  }
}

for (let i = 1; i <= 20; i++) {
  if (i % 2 !== 0) {
    console.log(i);
  }
}

for (let i = 1; i <= 10; i++) {
  console.log("5 x " + i + " = " + (5 * i));
}

</script>

</body>
</html>

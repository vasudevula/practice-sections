<!DOCTYPE html>
<html>
<body>

<script>

// 1 Print numbers 1 to 5
let i = 1;
do {
  console.log(i);
  i++;
} while (i <= 5);


// 2 Print numbers 5 to 1
let j = 5;
do {
  console.log(j);
  j--;
} while (j >= 1);


// 3 Multiples of 3 up to 30
let k = 3;
do {
  console.log(k);
  k += 3;
} while (k <= 30);


// 4 Numbers divisible by 4 from 1 to 20
let n = 1;
do {
  if (n % 4 === 0) {
    console.log(n);
  }
  n++;
} while (n <= 20);


// 5 Print numbers until value reaches 10
let x = 1;
do {
  console.log(x);
  x++;
} while (x <= 10);

</script>

</body>
</html>

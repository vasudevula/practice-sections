<!DOCTYPE html>
<html>
<body>

<script>

let num = 15;
if (num > 10) {
  console.log("Number is big");
}

let age = 20;
if (age >= 18) {
  console.log("Eligible to vote");
}

let temperature = 35;
if (temperature > 30) {
  console.log("Hot");
} else {
  console.log("Cool");
}

let number = -5;
if (number >= 0) {
  console.log("Positive");
} else {
  console.log("Negative");
}

let num2 = 8;
if (num2 % 2 === 0) {
  console.log("Even");
} else {
  console.log("Odd");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<body>

<script>

// 1 Function add(a,b)
function add(a, b) {
  return a + b;
}

let result = add(10, 20);
console.log("Addition:", result);


// 2 Function square(num)
function square(num) {
  return num * num;
}

let sq = square(5);
console.log("Square:", sq);


// 3 Function to check even or odd
function checkEvenOdd(num) {
  if (num % 2 === 0) {
    return "Even";
  } else {
    return "Odd";
  }
}

console.log(checkEvenOdd(8));


// 4 Function to find largest of two numbers
function largest(a, b) {
  if (a > b) {
    return a;
  } else {
    return b;
  }
}

console.log("Largest:", largest(15, 10));


// 5 Function to print greeting
function greet(name) {
  console.log("Hello " + name);
}

greet("Ramya");

</script>

</body>
</html>
